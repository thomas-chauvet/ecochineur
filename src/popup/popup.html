<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoChineur</title>
    <script type="module" src="./popup.ts"></script>
  </head>
  <body>
    <main class="popup-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <img src="/icons/icon.svg" alt="" class="logo" />
          <h1 data-i18n="app_name">EcoChineur</h1>
        </div>
        <label class="language-switch">
          <span data-i18n="language_label">Langue</span>
          <select id="language-select" aria-label="Langue">
            <option value="fr" data-i18n="fr">FR</option>
            <option value="en" data-i18n="en">EN</option>
          </select>
        </label>
      </header>

      <section class="panel" aria-labelledby="brand-section-title">
        <h2 id="brand-section-title" data-i18n="brand_section">
          Filtrer par marque
        </h2>
        <div class="option-list" id="category-options"></div>
        <button class="link-button" type="button" id="toggle-brands">
          Voir les marques correspondantes
        </button>
        <div class="brand-browser hidden" id="brand-browser">
          <label class="search-field">
            <span data-i18n="brand_search_label">Rechercher une marque</span>
            <input
              type="search"
              id="brand-search"
              autocomplete="off"
              placeholder="Nom de marque"
            />
          </label>
          <ul class="brand-list" id="brand-list"></ul>
        </div>
      </section>

      <section class="panel" aria-labelledby="material-section-title">
        <h2 id="material-section-title" data-i18n="material_section">
          Filtrer par matière
        </h2>
        <div class="material-grid" id="material-options"></div>
      </section>

      <section class="actions" aria-live="polite">
        <p class="notice" data-i18n="preserve_notice">
          Vos filtres Vinted existants seront conservés et complétés.
        </p>
        <button class="primary-button" type="button" id="apply-button" disabled>
          Appliquer les filtres
        </button>
        <button class="link-button subtle" type="button" id="reset-button">
          Réinitialiser les filtres Vinted
        </button>
        <p class="status" id="status-message"></p>
      </section>

      <footer>
        <button
          class="link-button"
          type="button"
          id="suggest-button"
          data-i18n="suggest_brand"
        >
          Suggérer une marque
        </button>
      </footer>
    </main>
  </body>
</html>
