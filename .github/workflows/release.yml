name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags are required so the build can derive the version
          # from `git describe` and git-cliff can generate the changelog.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Detect pre-release
        id: meta
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if [[ "$TAG" == *"-rc"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - run: npm run release:check

      - run: npm audit --audit-level=high

      - name: Package extension
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p release
          cd dist && zip -r "../release/ecochineur-${TAG}.zip" .

      - name: Generate release notes (this tag)
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate full changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --output /tmp/CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated changelog to main
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          cp /tmp/CHANGELOG.md CHANGELOG.md
          if git diff --quiet -- CHANGELOG.md; then
            echo "CHANGELOG.md unchanged; nothing to commit."
            exit 0
          fi
          git add CHANGELOG.md
          git commit -m "chore(release): update changelog for ${TAG} [skip ci]"
          git push origin main

      - uses: softprops/action-gh-release@v3
        with:
          files: release/ecochineur-${{ github.ref_name }}.zip
          body_path: RELEASE_NOTES.md
          prerelease: ${{ steps.meta.outputs.prerelease }}
