# git-cliff configuration — generates CHANGELOG.md and release notes from
# Conventional Commits. See https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to EcoChineur are documented here.\n
This file is generated automatically from Conventional Commits by [git-cliff](https://git-cliff.org).\n
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"

commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Refactor" },
  { message = "^doc", group = "<!-- 4 -->Documentation" },
  { message = "^test", group = "<!-- 5 -->Testing" },
  { message = "^style", skip = true },
  { message = "^chore\\(release\\):", skip = true },
  { message = "^chore\\(deps\\)", group = "<!-- 6 -->Dependencies" },
  { message = "^chore", group = "<!-- 7 -->Miscellaneous" },
  { message = "^build", group = "<!-- 8 -->Build System" },
  { message = "^ci", group = "<!-- 9 -->CI/CD" },
  { body = ".*security", group = "<!-- 10 -->Security" },
]

commit_preprocessors = [
  # Remove issue/PR numbers so the message reads cleanly.
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "" },
]
